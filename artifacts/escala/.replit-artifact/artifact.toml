kind = "web"
previewPath = "/"
title = "Plataforma de Escala"
version = "1.0.0"
id = "artifacts/escala"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20191

[services.development]
run = "pnpm --filter @workspace/escala run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/escala", "run", "build" ]
publicDir = "artifacts/escala/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20191"
BASE_PATH = "/"
